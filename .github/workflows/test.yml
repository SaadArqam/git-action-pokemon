name: backend-test
on: 
  push:
    branches: [main]
jobs:
  test-job:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: checkout repo
        uses: actions/checkout@v4
        
      - name: setup node
        uses: actions/setup-node@v4

      - name: install dependencies
        run: npm install

      - name: Run test
        run: npm test


